<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>校服店记账对账中枢</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main id="app" class="app-screen"></main>
  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white/95 backdrop-blur border-t border-[#c7c6ca] grid grid-cols-5 h-[68px] z-20">
    <button class="tab-btn active" data-tab="home"><span class="material-symbols-outlined block">edit_note</span><span class="text-[11px]">入账</span></button>
    <button class="tab-btn" data-tab="ledger"><span class="material-symbols-outlined block">receipt_long</span><span class="text-[11px]">账本</span></button>
    <button class="tab-btn" data-tab="stats"><span class="material-symbols-outlined block">monitoring</span><span class="text-[11px]">统计</span></button>
    <button class="tab-btn" data-tab="reconcile"><span class="material-symbols-outlined block">rule</span><span class="text-[11px]">对账</span></button>
    <button class="tab-btn" data-tab="settings"><span class="material-symbols-outlined block">settings</span><span class="text-[11px]">设置</span></button>
  </nav>
  <dialog id="entryDialog" class="w-[calc(100%-32px)] max-w-[398px] p-0 rounded border border-[#c7c6ca] backdrop:bg-black/30">
    <form method="dialog" class="card border-0 shadow-none p-4 space-y-3">
      <div class="flex items-center justify-between"><h2 id="dialogTitle" class="font-bold text-lg">速记入账</h2><button class="material-symbols-outlined">close</button></div>
      <textarea id="entryText" class="input min-h-32" placeholder="例如：170短袖2件 175短袖2件"></textarea>
      <input id="entryFile" type="file" class="hidden" accept="image/*,.txt,.csv,.xlsx" />
      <div id="parseErrors" class="text-xs text-[#ba1a1a]"></div>
      <div id="draftItems" class="space-y-2 max-h-64 overflow-auto safe-scroll"></div>
      <div class="grid grid-cols-2 gap-2"><button id="parseBtn" type="button" class="btn btn-secondary">解析</button><button id="confirmBtn" type="button" class="btn btn-primary">确认入账</button></div>
    </form>
  </dialog>
  <script src="/app.js"></script>
</body>
</html>
